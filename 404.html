<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>页面未找到 - GitShop</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 50px;
            background: #f8f9fa;
        }
        h1 {
            font-size: 36px;
            margin-bottom: 20px;
        }
        p {
            font-size: 18px;
            margin-bottom: 30px;
        }
        a {
            color: #0366d6;
            text-decoration: none;
        }
        a:hover {
            text-decoration: underline;
        }
    </style>
    <script>
        // 重定向到主页的脚本
        window.onload = function() {
            // 如果 URL 是 /gitShop/，但没有尾部斜杠，添加尾部斜杠
            if (window.location.pathname === '/gitShop') {
                window.location.href = '/gitShop/';
            }
            
            // 记录当前 URL
            console.log('当前 URL:', window.location.href);
            
            // 5 秒后自动重定向到主页
            setTimeout(function() {
                window.location.href = '/gitShop/';
            }, 5000);
        };
    </script>
</head>
<body>
    <h1>404 - 页面未找到</h1>
    <p>抱歉，您请求的页面不存在。</p>
    <p>5 秒后将自动跳转到 <a href="/gitShop/">GitShop 主页</a>。</p>
    <p>如果没有自动跳转，请点击上面的链接。</p>
</body>
</html>
