<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>GitShop 测试页面</title>
</head>
<body>
    <h1>GitShop 测试页面</h1>
    <p>如果您能看到这个页面，说明 GitHub Pages 正常工作。</p>
    <p>时间戳: <span id="timestamp"></span></p>
    
    <script>
        document.getElementById('timestamp').textContent = new Date().toISOString();
    </script>
</body>
</html>
