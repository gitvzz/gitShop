name: 同步商品价格

on:
  push:
    branches:
      - main
      - dev
    paths:
      - 'frontend/public/products/**'
  workflow_dispatch:
    inputs:
      reason:
        description: '手动触发同步的原因'
        required: false
        default: '手动同步商品价格'

# 设置权限
permissions:
  contents: write
  actions: write

jobs:
  sync-products:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v3
      
      - name: 同步商品价格及优惠，将用于验证订单信息 📊
        run: |
          
          # 确保 _data 目录存在
          mkdir -p _data
          
          # 安装依赖
          npm install --no-save fs path
          
          # 执行同步脚本
          node .github/workflows/scripts/sync-products.js
          
          echo "商品数据同步完成"
      
      - name: 提交商品价格到仓库 💾
        run: |
          echo "准备提交商品价格到仓库..."
          
          # 配置 Git
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          
          git add _data/products.json
          
          # 检查是否有变更需要提交
          if git diff --staged --quiet; then
            echo "products.json 没有变化，跳过提交"
          else
            # 提交更改
            git commit -m "自动更新商品价格"
            
            # 推送更改
            echo "推送更改到仓库..."
            git push
            
            echo "成功更新并提交 products.json"
          fi
          
      - name: 触发部署工作流 🚀
        if: success()
        run: |
          echo "正在触发部署工作流..."
          
          # 使用 GitHub CLI 触发部署工作流
          gh workflow run deploy.yml -f deploy_message="商品价格更新后的自动部署"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} 