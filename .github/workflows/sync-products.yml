name: 同步产品数据

on:
  push:
    branches:
      - main
      - dev
    paths:
      - 'frontend/public/products/**'
  workflow_dispatch:
    inputs:
      reason:
        description: '手动触发同步的原因'
        required: false
        default: '手动同步产品数据'

# 设置权限
permissions:
  contents: write
  actions: write

jobs:
  sync-products:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v3
      
      - name: 同步产品数据 📊
        run: |
          echo "开始同步产品数据..."
          
          # 确保目标目录存在
          mkdir -p dist/products
          
          # 复制产品数据到构建目录
          if [ -d "frontend/public/products" ]; then
            echo "复制 products 数据到构建输出目录..."
            cp -r frontend/public/products/* dist/products/
          else
            echo "警告：frontend/public/products 目录不存在！"
            exit 1
          fi
          
          # 确保 _data 目录存在
          mkdir -p _data
          
          # 安装依赖
          npm install --no-save fs path
          
          # 执行同步脚本
          node .github/workflows/scripts/sync-products.js
          
          echo "产品数据同步完成"
      
      - name: 提交产品数据到仓库 💾
        run: |
          echo "准备提交产品数据到仓库..."
          
          # 配置 Git
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          
          git add _data/products.json
          
          # 检查是否有变更需要提交
          if git diff --staged --quiet; then
            echo "products.json 没有变化，跳过提交"
          else
            # 提交更改
            git commit -m "自动更新产品数据"
            
            # 推送更改
            echo "推送更改到仓库..."
            git push
            
            echo "成功更新并提交 products.json"
          fi
          
      - name: 触发部署工作流 🚀
        if: success()
        run: |
          echo "正在触发部署工作流..."
          
          # 使用 GitHub CLI 触发部署工作流
          gh workflow run deploy.yml -f deploy_message="产品数据更新后的自动部署"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} 