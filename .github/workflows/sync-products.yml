name: 同步产品数据

on:
  push:
    branches:
      - main
      - dev
    paths:
      - 'frontend/public/products/**'
  workflow_dispatch:
    inputs:
      reason:
        description: '手动触发同步的原因'
        required: false
        default: '手动同步产品数据'

# 设置权限
permissions:
  contents: write
  actions: write

jobs:
  sync-products:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v3
        with:
          fetch-depth: 0  # 获取完整历史以便检测变更
      
      - name: 检查产品数据变更 🔍
        id: check_changes
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "手动触发同步，跳过变更检查"
            echo "has_changes=true" >> $GITHUB_OUTPUT
          else
            # 检查最近的提交是否修改了 products 目录
            CHANGED_FILES=$(git diff --name-only ${{ github.event.before }} ${{ github.sha }} | grep -E '^frontend/public/products/')
            if [[ -n "$CHANGED_FILES" ]]; then
              echo "检测到产品数据变更:"
              echo "$CHANGED_FILES"
              echo "has_changes=true" >> $GITHUB_OUTPUT
            else
              echo "未检测到产品数据变更"
              echo "has_changes=false" >> $GITHUB_OUTPUT
            fi
          fi
      
      - name: 复制产品数据到构建目录 📋
        if: steps.check_changes.outputs.has_changes == 'true'
        run: |
          echo "复制 products 数据到构建输出目录"
          if [ -d "frontend/public/products" ]; then
            echo "frontend/public/products 目录存在，正在复制..."
            mkdir -p dist/products
            cp -r frontend/public/products/* dist/products/
            echo "复制完成，dist/products 目录内容："
            ls -la dist/products/
          else
            echo "警告：frontend/public/products 目录不存在！"
            ls -la frontend/public/
            exit 1
          fi
      
      - name: 同步产品数据 📊
        if: steps.check_changes.outputs.has_changes == 'true'
        run: |
          echo "开始同步产品数据..."
          
          # 确保目标目录存在
          mkdir -p data
          
          # 检查 index.json 是否存在
          if [ -f "frontend/public/products/index.json" ]; then
            echo "找到 index.json，开始处理..."
            
            # 创建简化版的处理脚本
            echo 'const fs = require("fs");' > process_products.js
            echo 'const path = require("path");' >> process_products.js
            echo '' >> process_products.js
            echo 'try {' >> process_products.js
            echo '  const indexPath = path.join("frontend", "public", "products", "index.json");' >> process_products.js
            echo '  const indexData = JSON.parse(fs.readFileSync(indexPath, "utf8"));' >> process_products.js
            echo '  const productsData = [];' >> process_products.js
            echo '' >> process_products.js
            echo '  if (indexData.items && Array.isArray(indexData.items)) {' >> process_products.js
            echo '    for (const category of indexData.items) {' >> process_products.js
            echo '      const categoryPath = path.join("frontend", "public", "products", `${category.id}.json`);' >> process_products.js
            echo '      if (fs.existsSync(categoryPath)) {' >> process_products.js
            echo '        const categoryProducts = JSON.parse(fs.readFileSync(categoryPath, "utf8"));' >> process_products.js
            echo '        if (Array.isArray(categoryProducts)) {' >> process_products.js
            echo '          for (const product of categoryProducts) {' >> process_products.js
            echo '            const productData = { id: product.id, price: product.price, promotions: {} };' >> process_products.js
            echo '            if (product.merchant_id) productData.merchant_id = product.merchant_id;' >> process_products.js
            echo '            const promotions = product.promotions || {};' >> process_products.js
            echo '            if (promotions.discount_percent) {' >> process_products.js
            echo '              productData.promotions.discount_percent = promotions.discount_percent;' >> process_products.js
            echo '            } else if (promotions.tier_pricing) {' >> process_products.js
            echo '              productData.promotions.tier_pricing = promotions.tier_pricing' >> process_products.js
            echo '                .map(t => ({ min_quantity: t.min_quantity, discount_percent: t.discount_percent }))' >> process_products.js
            echo '                .filter((_, i) => i < 2)' >> process_products.js
            echo '                .sort((a, b) => b.min_quantity - a.min_quantity);' >> process_products.js
            echo '            } else if (promotions.threshold_discounts) {' >> process_products.js
            echo '              productData.promotions.threshold_discounts = promotions.threshold_discounts' >> process_products.js
            echo '                .map(t => ({ threshold: t.threshold, discount_amount: t.discount_amount }))' >> process_products.js
            echo '                .filter((_, i) => i < 2)' >> process_products.js
            echo '                .sort((a, b) => b.threshold - a.threshold);' >> process_products.js
            echo '            }' >> process_products.js
            echo '            productsData.push(productData);' >> process_products.js
            echo '          }' >> process_products.js
            echo '        }' >> process_products.js
            echo '      }' >> process_products.js
            echo '    }' >> process_products.js
            echo '  }' >> process_products.js
            echo '' >> process_products.js
            echo '  const outputPath = path.join("data", "products.json");' >> process_products.js
            echo '  fs.writeFileSync(outputPath, JSON.stringify(productsData, null, 2));' >> process_products.js
            echo '  console.log(`成功生成 products.json，包含 ${productsData.length} 个产品`);' >> process_products.js
            echo '' >> process_products.js
            echo '  if (fs.existsSync("dist/products")) {' >> process_products.js
            echo '    const distOutputPath = path.join("dist", "products", "products.json");' >> process_products.js
            echo '    fs.writeFileSync(distOutputPath, JSON.stringify(productsData, null, 2));' >> process_products.js
            echo '    console.log("同时更新了 dist/products/products.json");' >> process_products.js
            echo '  }' >> process_products.js
            echo '} catch (error) {' >> process_products.js
            echo '  console.error("处理产品数据时出错:", error);' >> process_products.js
            echo '  process.exit(1);' >> process_products.js
            echo '}' >> process_products.js
            
            # 执行脚本
            node process_products.js
            
            # 显示生成的文件
            echo "products.json 内容预览:"
            head -n 20 data/products.json
          else
            echo "错误：frontend/public/products/index.json 文件不存在！"
            exit 1
          fi
      
      - name: 提交更新的产品数据 
        if: steps.check_changes.outputs.has_changes == 'true'
        run: |
          # 确保目标目录存在
          mkdir -p data
          
          # 配置 Git
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          
          # 添加更改
          git add data/products.json
          
          # 检查是否有变更需要提交
          if git diff --staged --quiet; then
            echo "products.json 没有变化，跳过提交"
          else
            # 提交更改
            git commit -m "自动更新产品数据 [skip ci]"
            
            # 推送更改
            git push
            
            echo "成功更新并提交 products.json"
          fi
      
      - name: 部署到 gh-pages 分支 🚀
        if: steps.check_changes.outputs.has_changes == 'true' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev')
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist
          branch: gh-pages
          target-folder: products
          clean: true
          clean-exclude: |
            assets/**
            index.html
            favicon.ico
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "自动更新产品数据 [skip ci]"
      
      # 添加触发 deploy 工作流的步骤
      - name: 检查是否需要触发完整部署 🔄
        id: check_other_changes
        if: github.event_name == 'push'
        run: |
          # 检查除了 products 目录外是否还有其他变更
          OTHER_CHANGES=$(git diff --name-only ${{ github.event.before }} ${{ github.sha }} | grep -v -E '^frontend/public/products/')
          if [[ -n "$OTHER_CHANGES" ]]; then
            echo "检测到其他文件变更，需要触发完整部署"
            echo "has_other_changes=true" >> $GITHUB_OUTPUT
          else
            echo "未检测到其他文件变更，无需触发完整部署"
            echo "has_other_changes=false" >> $GITHUB_OUTPUT
          fi
      
      - name: 触发部署工作流 🚀
        if: steps.check_other_changes.outputs.has_other_changes == 'true'
        uses: benc-uk/workflow-dispatch@v1
        with:
          workflow: deploy.yml
          token: ${{ secrets.GITHUB_TOKEN }}
          inputs: '{"deploy_message": "产品数据更新后的自动部署"}' 