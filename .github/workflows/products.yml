name: 同步商品数据及摘要

on:
  push:
    branches:
      - main
      - dev
    paths:
      - 'products/**'
  workflow_dispatch:
    inputs:
      reason:
        description: '手动触发同步的原因'
        required: false
        default: '手动同步商品数据'

# 设置权限
permissions:
  contents: write
  actions: write

jobs:
  sync-products:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v3

      - name: Setup Node.js ⚙️
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'

      - name: 安装依赖
        run: npm install @actions/core @actions/github
      
      - name: 同步商品信息及摘要 📊
        run: node .github/workflows/scripts/products.js
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} 
