name: 处理Issue

on:
  issues:
    types: [opened, edited]

# 添加权限配置
permissions:
  issues: write
  pull-requests: write
  contents: write
  actions: write

jobs:
  process_order:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v3

      - name: 设置Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '16'
          
      - name: 安装依赖
        run: npm install @actions/core @actions/github node-forge ethers@5.7.2 bs58 crypto
        
      - name: 处理Issue
        id: handle_issue
        uses: actions/github-script@v6
        env:
          PRIVATE_KEY: ${{ secrets.PRIVATE_KEY }}
          WALLET_MNEMONIC: ${{ secrets.WALLET_MNEMONIC }}
        with:
          github-token: ${{secrets.GITHUB_TOKEN}}
          script: |
            const { handleIssue } = require('./.github/workflows/scripts/issue/index.js');
            const result = await handleIssue(github,context);
            
        
            console.log(`处理结果: ${JSON.stringify(result)}`);
            
            // 将 JSON 结果的各个属性分别设置为输出
            for (const [key, value] of Object.entries(result)) {
              core.setOutput(key, value);
            }
            
            return result;
            
      - name: 提交分销商数据并触发部署
        if: steps.handle_issue.outputs.distributors == 'true'
        run: |
          echo "分销商数据已更新，准备提交更改..."
          
          # 确保 _data 目录存在
          mkdir -p _data
          
          # 配置 Git
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          
          # 添加分销商数据文件
          git add _data/distributors.json
          
          # 检查是否有变更需要提交
          if git diff --staged --quiet; then
            echo "distributors.json 没有变化，跳过提交"
          else
            # 提交更改
            git commit -m "自动更新分销商数据"
            
            # 推送更改
            echo "推送更改到仓库..."
            git push
            
            echo "成功更新并提交 distributors.json"
          fi

      - name: 提交产品数据并触发部署
        if: steps.handle_issue.outputs.products == 'true'
        run: |
          echo "产品数据已更新，准备提交更改..."
          
          # 配置 Git
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          
          # 添加产品数据文件
          git add frontend/public/products/
          
          # 检查是否有变更需要提交
          if git diff --staged --quiet; then
            echo "产品数据没有变化，跳过提交"
          else
            # 提交更改
            git commit -m "自动更新产品数据"
            
            # 推送更改
            echo "推送更改到仓库..."
            git push
            
            echo "成功更新并提交产品数据"
          fi
          
      - name: 触发部署工作流
        if: steps.handle_issue.outputs.distributors == 'true' || steps.handle_issue.outputs.products == 'true'
        run: |
          echo "正在触发部署工作流..."
          
          # 使用 GitHub CLI 触发部署工作流
          gh workflow run deploy.yml -f deploy_message="数据更新后的自动部署"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
            
      