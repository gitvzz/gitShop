name: 处理订单

on:
  issues:
    types: [opened, edited]

# 添加权限配置
permissions:
  issues: write
  pull-requests: write
  contents: read

jobs:
  process_order:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v3

      - name: 设置Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '16'
          
      - name: 安装依赖
        run: npm install @actions/core @actions/github node-forge ethers@5.7.2
        
      - name: 检查是否为订单
        id: check_order
        uses: actions/github-script@v6
        with:
          script: |
            const checkOrder = require('./.github/workflows/scripts/check-order.js');
            const result = await checkOrder(context);
            
            console.log('检查订单结果:', JSON.stringify(result, null, 2));
            
            // 安全地获取属性值并转换为字符串
            const safeToString = (value) => {
              return value !== undefined && value !== null ? value.toString() : 'false';
            };
            
            // 设置输出变量，添加空值检查
            core.setOutput('isOrder', safeToString(result.isOrder));
            core.setOutput('isValid', safeToString(result.isValid));
            core.setOutput('signatureValid', safeToString(result.signatureValid));
            
            // 检查 issue 是否存在并且有 labels 属性
            const hasOrderLabel = context.payload.issue && 
                                 context.payload.issue.labels && 
                                 Array.isArray(context.payload.issue.labels) && 
                                 context.payload.issue.labels.some(label => label && label.name === 'order');
            core.setOutput('hasOrderLabel', hasOrderLabel.toString());
            
            if (result.encryptedOrderData) {
              core.setOutput('encryptedOrderData', result.encryptedOrderData);
            }
            
            if (result.encryptedShippingData) {
              core.setOutput('encryptedShippingData', result.encryptedShippingData);
            }
            
            // 将整个结果作为JSON字符串输出，确保处理控制字符
            const safeResult = JSON.stringify(result, (key, value) => {
              // 如果是字符串，替换所有控制字符
              if (typeof value === 'string') {
                return value.replace(/[\u0000-\u001F\u007F-\u009F]/g, '');
              }
              return value;
            });
            core.setOutput('result', safeResult);
            
            return result;
            
      - name: 处理非订单Issue（带order标签）
        if: steps.check_order.outputs.isOrder == 'false' && steps.check_order.outputs.hasOrderLabel == 'true'
        uses: actions/github-script@v6
        with:
          github-token: ${{secrets.GITHUB_TOKEN}}
          script: |
            const handleNonOrder = require('./.github/workflows/scripts/handle-non-order.js');
            await handleNonOrder(context, github, {
              isOrder: false,
              hasOrderLabel: true
            });
            
      - name: 处理无效订单
        if: steps.check_order.outputs.isOrder == 'true' && (steps.check_order.outputs.isValid == 'false' || steps.check_order.outputs.signatureValid == 'false')
        uses: actions/github-script@v6
        with:
          github-token: ${{secrets.GITHUB_TOKEN}}
          script: |
            const handleNonOrder = require('./.github/workflows/scripts/handle-non-order.js');
            await handleNonOrder(context, github, {
              isOrder: true,
              isValid: ${{steps.check_order.outputs.isValid == 'true'}},
              signatureValid: ${{steps.check_order.outputs.signatureValid == 'true'}},
              result: JSON.parse('${{steps.check_order.outputs.result}}')
            });
            
      - name: 解密订单数据
        if: steps.check_order.outputs.isOrder == 'true' && steps.check_order.outputs.isValid == 'true'
        id: decrypt_order
        uses: actions/github-script@v6
        env:
          PRIVATE_KEY: ${{ secrets.PRIVATE_KEY }}
        with:
          script: |
            const fs = require('fs');
            const decryptOrder = require('./.github/workflows/scripts/decrypt-order.js');
            
            // 加载商品数据库
            const productsDatabase = JSON.parse(fs.readFileSync('.github/workflows/data/products.json', 'utf8'));
            
            try {
              // 解析JSON时处理可能的控制字符
              const resultStr = '${{steps.check_order.outputs.result}}';
              // 移除可能的控制字符
              const cleanResultStr = resultStr.replace(/[\u0000-\u001F\u007F-\u009F]/g, '');
              const result = JSON.parse(cleanResultStr);
              
              console.log('解析的结果对象:', Object.keys(result));
              
              // 解密订单数据
              const decryptResult = await decryptOrder(result, process.env.PRIVATE_KEY, productsDatabase);
              
              // 设置输出变量
              core.setOutput('success', decryptResult.success.toString());
              core.setOutput('result', JSON.stringify(decryptResult));
              
              return decryptResult;
            } catch (error) {
              console.error('解析或解密订单数据时出错:', error);
              console.error('错误位置:', error.stack);
              core.setFailed(`解析或解密订单数据失败: ${error.message}`);
              return { success: false, message: error.message };
            }
            
      - name: 生成钱包地址
        if: steps.check_order.outputs.isOrder == 'true' && steps.check_order.outputs.isValid == 'true' && steps.decrypt_order.outputs.success == 'true'
        id: generate_wallet
        uses: actions/github-script@v6
        env:
          WALLET_MNEMONIC: ${{ secrets.WALLET_MNEMONIC }}
        with:
          script: |
            const generateWallet = require('./.github/workflows/scripts/generate-wallet.js');
            const decryptResult = JSON.parse('${{steps.decrypt_order.outputs.result}}');
            
            // 获取用户名 - 从issue创建者获取
            const username = context.payload.issue.user.login;
            
            // 调用修改后的generateWallet函数，只传入username和mnemonic两个参数
            const walletResult = generateWallet(username, process.env.WALLET_MNEMONIC);
            
            core.setOutput('walletAddress', walletResult.walletAddress);
            core.setOutput('walletPath', walletResult.walletPath);
            
            return walletResult;
            
      - name: 回复订单确认
        if: steps.check_order.outputs.isOrder == 'true' && steps.check_order.outputs.isValid == 'true' && steps.decrypt_order.outputs.success == 'true'
        uses: actions/github-script@v6
        with:
          github-token: ${{secrets.GITHUB_TOKEN}}
          script: |
            const replyOrder = require('./.github/workflows/scripts/reply-order.js');
            const decryptResult = JSON.parse('${{steps.decrypt_order.outputs.result}}');
            const walletAddress = '${{steps.generate_wallet.outputs.walletAddress}}';
            
            await replyOrder(context, github, decryptResult.orderData, walletAddress); 