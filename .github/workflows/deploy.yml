name: Deploy to GitHub Pages

on:
  push:
    branches: [ main, dev ]
  workflow_dispatch:

# 添加明确的权限配置
permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v3

      - name: Setup Node.js ⚙️
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: 'frontend/package-lock.json'

      - name: Install Dependencies 📦
        run: |
          cd frontend
          npm ci
      
      - name: Create .env file 🔧
        run: |
          cd frontend
          echo "VITE_GITHUB_USERNAME=${{ github.repository_owner }}" > .env
          echo "VITE_GITHUB_REPOSITORY=$(echo ${{ github.repository }} | cut -d'/' -f2)" >> .env
          echo "VITE_GITHUB_BRANCH=main" >> .env
          echo "VITE_PUBLIC_KEY=${{ secrets.PUBLIC_KEY }}" >> .env
      
      - name: Build 🏗️
        run: |
          cd frontend
          npm run build
      
      - name: Debug 🔍
        run: |
          echo "列出构建输出目录内容"
          ls -la
          echo "检查 dist 目录是否存在及其内容"
          if [ -d "dist" ]; then
            echo "dist 目录存在，内容如下："
            ls -la dist
            echo "检查 dist/index.html 是否存在"
            if [ -f "dist/index.html" ]; then
              echo "dist/index.html 存在"
              head -n 20 dist/index.html
            else
              echo "dist/index.html 不存在！"
            fi
          else
            echo "dist 目录不存在！"
          fi
          echo "检查 frontend/dist 目录"
          ls -la frontend/dist || echo "frontend/dist 目录不存在"
      
      - name: Force Deploy 🚀
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist
          branch: gh-pages
          clean: true
          force: true
          token: ${{ secrets.GITHUB_TOKEN }}
          exclude: |
            **/.env
            **/.env.*
            **/node_modules
            **/.git
            **/.github 