name: Deploy to GitHub Pages

on:
  workflow_dispatch:
    inputs:
      deploy_message:
        description: '部署说明'
        required: false
        default: '手动触发部署'
  # 添加自动触发条件，但排除 products 目录
  push:
    branches:
      - main
      - dev
    paths:
      - 'frontend/**'
    paths-ignore:
      - 'frontend/public/products/**'

# 添加明确的权限配置
permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v3
        with:
          fetch-depth: 0  # 获取完整历史以便检测变更
          # 添加 token 以确保有足够的权限
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js ⚙️
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: 'frontend/package-lock.json'

      - name: Install Dependencies 📦
        run: |
          cd frontend
          npm ci
      
      - name: Create .env file 🔧
        run: |
          cd frontend
          echo "VITE_GITHUB_USERNAME=${{ github.repository_owner }}" > .env
          echo "VITE_GITHUB_REPOSITORY=$(echo ${{ github.repository }} | cut -d'/' -f2)" >> .env
          echo "VITE_GITHUB_BRANCH=main" >> .env
          echo "VITE_PUBLIC_KEY=\"${{ secrets.PUBLIC_KEY }}\"" >> .env
      
      - name: Build 🏗️
        run: |
          cd frontend
          npm run build
          
          # 显示构建结果
          echo "构建完成，dist 目录内容："
          ls -la dist/
      
      # 移除 Copy Products Data 步骤
      
      # 移除 Generate Products JSON 步骤
      
      - name: Force Deploy 🚀
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist
          branch: gh-pages
          clean: true
          force: true
          token: ${{ secrets.GITHUB_TOKEN }}
          exclude: |
            **/.env
            **/.env.*
            **/node_modules
            **/.git
            **/.github
          commit-message: "${{ github.event.inputs.deploy_message || '自动部署' }}" 
          # 添加静默选项，减少日志输出
          silent: false
          # 添加单分支选项，避免历史问题
          single-commit: true 